name: Validate Configuration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts are executable
        run: |
          EXIT=0
          for f in $(find .claude/hooks claude/memory-persistence -name "*.sh" 2>/dev/null); do
            if [ ! -x "$f" ]; then
              echo "ERROR: $f is not executable"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: Lint shell scripts with shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.claude/hooks'
          additional_files: 'claude/memory-persistence/save-state.sh claude/memory-persistence/load-state.sh claude/install.sh'

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            echo "Validating $f"
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; exit 1; }
          done

      - name: Check SKILL.md files exist for all skills
        run: |
          for d in claude/skills/*/; do
            if [ ! -f "${d}SKILL.md" ]; then
              echo "ERROR: Missing SKILL.md in $d"
              exit 1
            fi
          done

      - name: Check skill frontmatter
        run: |
          for d in claude/skills/*/; do
            if [ -f "${d}SKILL.md" ] && ! head -1 "${d}SKILL.md" | grep -q "^---"; then
              echo "ERROR: Missing frontmatter in ${d}SKILL.md"
              exit 1
            fi
          done

      - name: Check agent frontmatter
        run: |
          for f in claude/agents/*.md; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "ERROR: Missing frontmatter in $f"
              exit 1
            fi
            if ! grep -q "^model:" "$f"; then
              echo "ERROR: Missing model field in $f"
              exit 1
            fi
          done

      - name: Check required files exist
        run: |
          for f in CLAUDE.md .gitignore .claude/settings.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
          done

      - name: Run test suite
        run: |
          bash claude/tests/test-hooks.sh
          bash claude/tests/test-configs.sh
